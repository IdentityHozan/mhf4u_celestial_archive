<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Archive - MHF4U</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="models.css">
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body class="archive-body">
    <div class="deep-space-bg">
        <div class="nebula-purple"></div>
        <div class="nebula-teal"></div>
        <div class="starfield-back"></div>
        <div class="starfield-front"></div>
        <div class="shooting-stars"><span></span><span></span><span></span></div>
    </div>

    <div class="archive-shell">
        <header class="archive-topbar">
            <div class="archive-breadcrumb">
                <span class="archive-emblem">✦</span>
                <span class="mobile-hide">MODEL ARCHIVE / ALL</span>
                <span class="mobile-show">ARCHIVE</span>
            </div>
            <div class="archive-top-actions">
                <span class="mobile-hide">Archive entries unlocked: <strong>9</strong></span>
                <a href="index.html" class="archive-close" aria-label="Return to landing page">✕</a>
            </div>
        </header>

        <main class="archive-layout">
            <aside class="archive-sidebar">
                
                <div class="search-slate">
                    <span>⌕</span>
                    <input id="searchInput" type="text" placeholder="Search models..." onkeyup="filterModels()">
                </div>

                <div class="side-heading">RECENTLY UNLOCKED</div>
                
                <div class="model-tabs" id="tabContainer">
                    <button class="model-tab" data-category="reciprocal" onclick="showModel(3)"><span></span><b>I.</b> Chair Backrest</button>
                    <button class="model-tab" data-category="reciprocal" onclick="showModel(2)"><span></span><b>II.</b> Levi Cape Curve</button>
                    <button class="model-tab" data-category="polynomial" onclick="showModel(1)"><span></span><b>III.</b> Mountain Ridge</button>
                    <button class="model-tab" data-category="trigonometric" onclick="showModel(4)"><span></span><b>IV.</b> Mural Arch</button>
                    <button class="model-tab" data-category="trigonometric" onclick="showModel(5)"><span></span><b>V.</b> Building Arch</button>
                    <button class="model-tab" data-category="exponential" onclick="showModel(6)"><span></span><b>VI.</b> Concrete Path</button>
                    <button class="model-tab" data-category="logarithmic" onclick="showModel(7)"><span></span><b>VII.</b> Wall Painting</button>
                    <button class="model-tab" data-category="absolute" onclick="showModel(8)"><span></span><b>VIII.</b> Caduceus V-Shape</button>
                    <button class="model-tab" data-category="root" onclick="showModel(9)"><span></span><b>IX.</b> Ceiling Recess</button>
                </div>

                <select id="categoryFilter" class="filter-bar" onchange="filterModels()">
                    <option value="all">All Function Types</option>
                    <option value="reciprocal">Reciprocal</option>
                    <option value="polynomial">Polynomial</option>
                    <option value="trigonometric">Trigonometric</option>
                    <option value="exponential">Exponential</option>
                    <option value="logarithmic">Logarithmic</option>
                    <option value="absolute">Absolute Value</option>
                    <option value="root">Square Root</option>
                </select>
            </aside>

            <section class="archive-stage">
                <div class="stage-background-lines"></div>

                <div id="dynamic-model-target"></div>

                <footer class="model-footer">
                    <button onclick="prevModel()">Previous</button>
                    <div class="page-dots" id="pageDots"></div>
                    <button onclick="nextModel()">Next</button>
                </footer>
            </section>
        </main>
    </div>

    <script src="index.js"></script>
</body>
</html>
